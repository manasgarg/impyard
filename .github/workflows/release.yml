name: release

# Publish to crates.io when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Needs a CARGO_REGISTRY_TOKEN repository secret:
#   https://crates.io/settings/tokens  →  Settings → Secrets → Actions
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: verify the tag matches Cargo.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(cargo metadata --no-deps --format-version 1 \
                  | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          echo "tag=$tag crate=$crate"
          test "$tag" = "$crate" || { echo "tag $tag != Cargo.toml $crate"; exit 1; }
      - name: test
        run: cargo test --locked
      - name: publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
